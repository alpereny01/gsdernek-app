services:
  # Backend Web Service
  - type: web
    name: gsdernek-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1

  # Frontend Static Site
  - type: web
    name: gsdernek-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist -s -l 3000
    envVars:
      - key: NODE_ENV
        value: production
