<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stuttgart Galatasaraylılar Derneği - UI Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --text: #f4f4f5;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            background: linear-gradient(to right, #FFB612, #8A0304);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #a1a1aa;
            margin-top: 10px;
        }
        .showcase-container {
            display: flex;
            gap: 40px;
            padding: 20px;
            max-width: 1800px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
        .device-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .device-label {
            font-weight: 500;
            color: #d4d4d8;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .desktop-frame {
            width: 1024px;
            height: 768px;
            border: 8px solid #27272a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: #121212;
        }
        .mobile-frame {
            width: 375px;
            height: 812px;
            border: 12px solid #27272a;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: #121212;
            position: relative;
        }
        /* Mobile notch mock */
        .mobile-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #27272a;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            z-index: 10;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 1500px) {
            .desktop-frame {
                width: 800px;
                height: 600px;
            }
        }
        @media (max-width: 1250px) {
            .showcase-container {
                flex-direction: column;
                align-items: center;
            }
            .desktop-frame {
                width: 100%;
                max-width: 1024px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Stuttgart Galatasaraylılar Derneği</h1>
        <p>High-Fidelity UI/UX Design - Management Panel</p>
    </header>

    <div class="showcase-container">
        <div class="device-wrapper">
            <div class="device-label">Desktop View</div>
            <div class="desktop-frame">
                <iframe src="app.html"></iframe>
            </div>
        </div>

        <div class="device-wrapper">
            <div class="device-label">Mobile View</div>
            <div class="mobile-frame">
                <iframe src="app.html"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
